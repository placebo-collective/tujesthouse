name: Check for Package Updates

on:
  # Run weekly on Mondays at 9 AM
  schedule:
    - cron: '0 9 * * 1'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  check-updates:
    name: Check for Outdated Packages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check for outdated packages
        id: outdated
        run: |
          echo "## 📦 Package Update Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Checking for outdated packages..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if npm outdated --json > outdated.json 2>/dev/null || true; then
            if [ -s outdated.json ] && [ "$(cat outdated.json)" != "{}" ]; then
              echo "### 🔄 Updates Available:" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              npm outdated >> $GITHUB_STEP_SUMMARY 2>&1 || true
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Note**: Dependabot will automatically create PRs for these updates." >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ All packages are up to date!" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
      - name: Check for security vulnerabilities
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔒 Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if npm audit --json > audit.json 2>/dev/null || true; then
            VULN_COUNT=$(cat audit.json | jq -r '.metadata.vulnerabilities | values | to_entries | map(.value) | add // 0')
            
            if [ "$VULN_COUNT" = "0" ]; then
              echo "✅ No security vulnerabilities found!" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Found $VULN_COUNT vulnerabilities" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              npm audit >> $GITHUB_STEP_SUMMARY 2>&1 || true
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi
