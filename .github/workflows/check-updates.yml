name: Check Updates

on:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Mondays at 9 AM
  workflow_dispatch:

jobs:
  check-updates:
    name: Check Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Check packages and security
        run: |
          echo "## Package Updates" >> $GITHUB_STEP_SUMMARY
          npm outdated >> $GITHUB_STEP_SUMMARY 2>&1 || echo "All packages up to date" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Security Audit" >> $GITHUB_STEP_SUMMARY
          npm audit >> $GITHUB_STEP_SUMMARY 2>&1 || echo "No vulnerabilities" >> $GITHUB_STEP_SUMMARY
